services:
  mongo_db:
    image: mongo:8
    restart: always
    volumes:
      - mongo_db:/data/db
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - 8080:80
    environment:
      VITE_SERVER_HOST: server
      VITE_SERVER_PORT: 3000
    restart: always
    depends_on:
      - server

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - 3000:3000
    environment:
      CLIENT_HOST: "*"
      CLIENT_PORT: 8080
      DB_HOST: mongo_db
      JWT_PRIVATE_KEY: "privateKey"
      SERVER_PORT: 3000
    depends_on:
      - mongo_db

volumes:
  mongo_db: {}
