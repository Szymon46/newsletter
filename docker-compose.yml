services:
  mongo_db:
    image: mongo:4.4.6
    restart: always
    volumes:
      - mongo_db:/data/db
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_SERVER_HOST: server
        VITE_SERVER_PORT: 3000
        VITE_WEATHER_API_KEY: ""
    ports:
      - 8080:80
    restart: always
    depends_on:
      - server

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      args:
        CLIENT_HOST: "*"
        CLIENT_PORT: 8080
        DB_HOST: mongo_db
        JWT_PRIVATE_KEY: "privateKey"
        SERVER_PORT: 3000
    ports:
      - 3000:3000
    restart: always
    depends_on:
      - mongo_db

volumes:
  mongo_db: {}
